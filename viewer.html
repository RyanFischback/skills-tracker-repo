<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rfischbackdev | Skills Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f5f1;
        --ink: #111827;
        --muted: #4b5563;
        --stroke: #d1d5db;
        --card: #ffffffd6;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 85% 10%, #ccfbf1 0%, transparent 32%),
          radial-gradient(circle at 5% 85%, #fde68a 0%, transparent 28%),
          var(--bg);
      }

      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .btn {
        text-decoration: none;
        color: var(--ink);
        border: 1px solid var(--stroke);
        background: #fff;
        border-radius: 999px;
        padding: 8px 12px;
      }

      .doc {
        border: 1px solid var(--stroke);
        background: var(--card);
        border-radius: 14px;
        padding: 18px;
        backdrop-filter: blur(2px);
      }

      .doc h1,
      .doc h2,
      .doc h3 {
        line-height: 1.2;
      }

      .doc a {
        color: var(--accent);
      }

      .doc code {
        font-family: "IBM Plex Mono", monospace;
        background: #f3f4f6;
        border-radius: 4px;
        padding: 1px 4px;
      }

      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <a class="btn" href="index.html">Back to Home</a>
        <div class="mono">rfischbackdev</div>
        <a
          class="btn"
          href="https://instagram.com/rfischbackdev"
          target="_blank"
          rel="noopener noreferrer"
          >Instagram</a
        >
        <a
          class="btn"
          href="https://github.com/RyanFischback"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
        <div id="path" class="mono"></div>
      </div>
      <article id="doc" class="doc">Loading…</article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const out = document.getElementById("doc");
      const pathEl = document.getElementById("path");
      const params = new URLSearchParams(window.location.search);
      const rawDoc = params.get("doc") || "skills/skills-directory.md";

      // Keep path access constrained to this repository content.
      const safeDoc = /^[a-zA-Z0-9_./-]+\.md$/.test(rawDoc) ? rawDoc : null;

      if (!safeDoc || (!safeDoc.startsWith("skills/") && !safeDoc.startsWith("docs/"))) {
        out.innerHTML = '<p class="error">Invalid document path.</p>';
      } else {
        pathEl.textContent = safeDoc;
        fetch(safeDoc)
          .then((r) => {
            if (!r.ok) throw new Error("Document not found.");
            return r.text();
          })
          .then((md) => {
            out.innerHTML = marked.parse(md);
          })
          .catch((err) => {
            out.innerHTML = `<p class="error">${err.message}</p>`;
          });
      }
    </script>
  </body>
</html>
